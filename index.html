<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Rifan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#0f0c29,#000);
  color:white;
  text-align:center;
}
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid cyan;
  box-shadow:0 0 20px cyan;
}
h1{color:cyan;}
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px #00ffff55;
}
button{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(45deg,cyan,blue);
  color:white;
}
input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#000;
  color:white;
}
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.popup img{
  width:280px;
  border-radius:20px;
  box-shadow:0 0 30px cyan;
}
</style>
</head>
<body>

<div class="container">
  <img src="foto.jpg" class="profile">
  <h1>@Rifanakbar_8</h1>
  <p>Support & Donasi 💚</p>

  <div class="card">
    <h2>Pilih Nominal</h2>
    <button onclick="setNominal(2000)">Donasi 2.000</button>
    <button onclick="setNominal(5000)">Donasi 5.000</button>
    <button onclick="setNominal(10000)">Donasi 10.000</button>
    <button onclick="setNominal(20000)">Donasi 20.000</button>

    <input type="text" id="nama" placeholder="Nama kamu">
    <input type="email" id="email" placeholder="Email (opsional)">
    <textarea id="pesan" placeholder="Pesan dukungan..."></textarea>

    <button onclick="kirimDonasi()">Lanjut Donasi 💸</button>
  </div>
</div>

<div class="popup" id="popup">
  <h2>Scan QR untuk Donasi</h2>
  <img src="QRIS.jpg">
  <p>Buka Gopay / BRImo lalu scan QR</p>
  <button onclick="tutup()">Tutup</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwdUXVwWsiTZHQHI6yoJ8KKxTROpsGKM0SsHq1-mb1HHrtJR5VU596YNAwQb2YiGuC2vw/exec";
let nominalDipilih = 0;

function setNominal(n){
  nominalDipilih = n;
  alert("Nominal dipilih: Rp " + n);
}

function kirimDonasi(){
  const nama = document.getElementById("nama").value;
  const email = document.getElementById("email").value;
  const pesan = document.getElementById("pesan").value;

  if(nominalDipilih === 0){
    alert("Pilih nominal dulu!");
    return;
  }

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      nama:nama,
      email:email,
      pesan:pesan,
      nominal:nominalDipilih,
      metode:"QRIS"
    })
  });

  document.getElementById("popup").style.display="flex";
}

function tutup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
